services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ecosphere
      POSTGRES_PASSWORD: ecosphere
      POSTGRES_DB: ecosphere
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecosphere"]
      interval: 3s
      timeout: 3s
      retries: 20
    volumes: ["postgres_data:/var/lib/postgresql/data"]

  migrate:
    image: migrate/migrate:v4.18.2
    volumes: ["./migrations:/migrations:ro"]
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["tools"]

  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgres://ecosphere:ecosphere@postgres:5432/ecosphere?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-development-only-secret-change-me}
    ports: ["8080:8080"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  web:
    build: ./web
    environment:
      VITE_API_URL: http://localhost:8080
    ports: ["5173:5173"]
    depends_on: [api]

  mailhog:
    image: mailhog/mailhog:v1.0.1
    ports: ["1025:1025", "8025:8025"]

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: ecosphere
      MINIO_ROOT_PASSWORD: ecosphere-secret
    ports: ["9000:9000", "9001:9001"]
    volumes: ["minio_data:/data"]

volumes:
  postgres_data:
  minio_data:
