name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ecosphere
          POSTGRES_PASSWORD: ecosphere
          POSTGRES_DB: ecosphere
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U ecosphere"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.22' }
      - run: go test ./...
      - run: test -z "$(gofmt -l .)"
      - run: go vet ./...
      - run: go install github.com/golang-migrate/migrate/v4/cmd/migrate@v4.18.2
      - run: migrate -path migrations -database "postgres://ecosphere:ecosphere@localhost:5432/ecosphere?sslmode=disable" up
      - run: migrate -path migrations -database "postgres://ecosphere:ecosphere@localhost:5432/ecosphere?sslmode=disable" down -all
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 11.7.0 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm, cache-dependency-path: web/pnpm-lock.yaml }
      - run: pnpm install --frozen-lockfile
        working-directory: web
      - run: pnpm lint && pnpm test --run && pnpm build
        working-directory: web
