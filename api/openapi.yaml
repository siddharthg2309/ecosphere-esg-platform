openapi: 3.1.0
info: { title: EcoSphere API, version: 1.0.0 }
servers: [{ url: 'http://localhost:8080' }]
security: [{ bearerAuth: [] }]
paths:
  /health:
    get:
      security: []
      operationId: health
      responses: { '200': { description: Healthy } }
  /auth/login:
    post:
      security: []
      operationId: login
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/LoginRequest' } } } }
      responses: { '200': { description: Authenticated, content: { application/json: { schema: { $ref: '#/components/schemas/AuthResponse' } } } }, '401': { $ref: '#/components/responses/Error' } }
  /auth/refresh:
    post:
      security: []
      operationId: refreshToken
      requestBody: { required: true, content: { application/json: { schema: { type: object, required: [refreshToken], properties: { refreshToken: { type: string } } } } } }
      responses: { '200': { description: Rotated tokens, content: { application/json: { schema: { $ref: '#/components/schemas/AuthResponse' } } } }, '401': { $ref: '#/components/responses/Error' } }
  /me:
    get:
      operationId: currentUser
      responses: { '200': { description: Current user, content: { application/json: { schema: { $ref: '#/components/schemas/User' } } } } }
  /departments:
    get:
      operationId: listDepartments
      parameters: [{ $ref: '#/components/parameters/Limit' }, { $ref: '#/components/parameters/Offset' }]
      responses: { '200': { description: Department page, content: { application/json: { schema: { $ref: '#/components/schemas/DepartmentPage' } } } } }
    post:
      operationId: createDepartment
      requestBody: { $ref: '#/components/requestBodies/DepartmentInput' }
      responses: { '201': { description: Created, content: { application/json: { schema: { $ref: '#/components/schemas/Department' } } } }, '409': { $ref: '#/components/responses/Error' } }
  /departments/{id}:
    parameters: [{ $ref: '#/components/parameters/ID' }]
    get: { operationId: getDepartment, responses: { '200': { description: Department, content: { application/json: { schema: { $ref: '#/components/schemas/Department' } } } } } }
    put: { operationId: updateDepartment, requestBody: { $ref: '#/components/requestBodies/DepartmentInput' }, responses: { '200': { description: Updated, content: { application/json: { schema: { $ref: '#/components/schemas/Department' } } } } } }
    delete: { operationId: deactivateDepartment, responses: { '200': { description: Deactivated, content: { application/json: { schema: { $ref: '#/components/schemas/Department' } } } } } }
  /categories:
    get:
      operationId: listCategories
      parameters: [{ $ref: '#/components/parameters/Limit' }, { $ref: '#/components/parameters/Offset' }, { name: type, in: query, schema: { $ref: '#/components/schemas/CategoryType' } }]
      responses: { '200': { description: Category page } }
    post: { operationId: createCategory, requestBody: { $ref: '#/components/requestBodies/EntityBody' }, responses: { '201': { description: Created } } }
  /categories/{id}:
    parameters: [{ $ref: '#/components/parameters/ID' }]
    get: { operationId: getCategory, responses: { '200': { description: Category } } }
    put: { operationId: updateCategory, requestBody: { $ref: '#/components/requestBodies/EntityBody' }, responses: { '200': { description: Updated } } }
    delete: { operationId: deleteCategory, responses: { '204': { description: Deleted }, '409': { $ref: '#/components/responses/Error' } } }
  /emission-factors:
    get:
      operationId: listEmissionFactors
      parameters: [{ $ref: '#/components/parameters/Limit' }, { $ref: '#/components/parameters/Offset' }, { name: category, in: query, schema: { type: string, format: uuid } }]
      responses: { '200': { description: Emission factor page } }
    post: { operationId: createEmissionFactor, requestBody: { $ref: '#/components/requestBodies/EntityBody' }, responses: { '201': { description: Created } } }
  /emission-factors/{id}:
    parameters: [{ $ref: '#/components/parameters/ID' }]
    get: { operationId: getEmissionFactor, responses: { '200': { description: Emission factor } } }
    put: { operationId: updateEmissionFactor, requestBody: { $ref: '#/components/requestBodies/EntityBody' }, responses: { '200': { description: Updated } } }
    delete: { operationId: deleteEmissionFactor, responses: { '204': { description: Deleted }, '409': { $ref: '#/components/responses/Error' } } }
  /products:
    get: { operationId: listProductProfiles, parameters: [{ $ref: '#/components/parameters/Limit' }, { $ref: '#/components/parameters/Offset' }], responses: { '200': { description: Product profile page } } }
    post: { operationId: createProductProfile, requestBody: { $ref: '#/components/requestBodies/EntityBody' }, responses: { '201': { description: Created } } }
  /products/{id}:
    parameters: [{ $ref: '#/components/parameters/ID' }]
    get: { operationId: getProductProfile, responses: { '200': { description: Product profile } } }
    put: { operationId: updateProductProfile, requestBody: { $ref: '#/components/requestBodies/EntityBody' }, responses: { '200': { description: Updated } } }
    delete: { operationId: deleteProductProfile, responses: { '204': { description: Deleted }, '409': { $ref: '#/components/responses/Error' } } }
  /policies:
    get: { operationId: listPolicies, parameters: [{ $ref: '#/components/parameters/Limit' }, { $ref: '#/components/parameters/Offset' }], responses: { '200': { description: Policy page } } }
    post: { operationId: createPolicy, requestBody: { $ref: '#/components/requestBodies/EntityBody' }, responses: { '201': { description: Created } } }
  /policies/{id}:
    parameters: [{ $ref: '#/components/parameters/ID' }]
    get: { operationId: getPolicy, responses: { '200': { description: Policy } } }
    put: { operationId: publishPolicyRevision, requestBody: { $ref: '#/components/requestBodies/EntityBody' }, responses: { '200': { description: Updated and version incremented } } }
    delete: { operationId: deletePolicy, responses: { '204': { description: Deleted }, '409': { $ref: '#/components/responses/Error' } } }
  /badges:
    get: { operationId: listBadges, parameters: [{ $ref: '#/components/parameters/Limit' }, { $ref: '#/components/parameters/Offset' }], responses: { '200': { description: Badge page } } }
    post: { operationId: createBadge, requestBody: { $ref: '#/components/requestBodies/EntityBody' }, responses: { '201': { description: Created } } }
  /badges/{id}:
    parameters: [{ $ref: '#/components/parameters/ID' }]
    get: { operationId: getBadge, responses: { '200': { description: Badge } } }
    put: { operationId: updateBadge, requestBody: { $ref: '#/components/requestBodies/EntityBody' }, responses: { '200': { description: Updated } } }
    delete: { operationId: deleteBadge, responses: { '204': { description: Deleted }, '409': { $ref: '#/components/responses/Error' } } }
  /rewards:
    get: { operationId: listRewards, parameters: [{ $ref: '#/components/parameters/Limit' }, { $ref: '#/components/parameters/Offset' }], responses: { '200': { description: Reward page } } }
    post: { operationId: createReward, requestBody: { $ref: '#/components/requestBodies/EntityBody' }, responses: { '201': { description: Created } } }
  /rewards/{id}:
    parameters: [{ $ref: '#/components/parameters/ID' }]
    get: { operationId: getReward, responses: { '200': { description: Reward } } }
    put: { operationId: updateReward, requestBody: { $ref: '#/components/requestBodies/EntityBody' }, responses: { '200': { description: Updated } } }
    delete: { operationId: deleteReward, responses: { '204': { description: Deleted }, '409': { $ref: '#/components/responses/Error' } } }
  /employees:
    get: { operationId: listEmployees, parameters: [{ $ref: '#/components/parameters/Limit' }, { $ref: '#/components/parameters/Offset' }], responses: { '200': { description: Employee page } } }
    post: { operationId: createEmployee, requestBody: { $ref: '#/components/requestBodies/EntityBody' }, responses: { '201': { description: Created } } }
  /employees/{id}:
    parameters: [{ $ref: '#/components/parameters/ID' }]
    get: { operationId: getEmployee, responses: { '200': { description: Employee } } }
    put: { operationId: updateEmployee, requestBody: { $ref: '#/components/requestBodies/EntityBody' }, responses: { '200': { description: Updated } } }
    delete: { operationId: deactivateEmployee, responses: { '204': { description: Deactivated } } }
  /settings/esg-config:
    get: { operationId: getESGConfig, responses: { '200': { description: ESG configuration, content: { application/json: { schema: { $ref: '#/components/schemas/ESGConfig' } } } } } }
    put: { operationId: updateESGConfig, requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/ESGConfig' } } } }, responses: { '200': { description: Updated }, '400': { $ref: '#/components/responses/Error' } } }
  /settings/notification-preferences:
    get: { operationId: getNotificationPreferences, responses: { '200': { description: Notification preferences, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/NotificationPreference' } } } } } } }
    put: { operationId: updateNotificationPreferences, requestBody: { required: true, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/NotificationPreference' } } } } }, responses: { '200': { description: Updated } } }
  /carbon/ingest:
    post:
      operationId: ingestCarbonEvidence
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema: { type: object, required: [file], properties: { file: { type: string, format: binary } } }
      responses:
        '200': { description: Advisory categorization, content: { application/json: { schema: { $ref: '#/components/schemas/CarbonSuggestion' } } } }
        '400': { $ref: '#/components/responses/Error' }
        '409': { $ref: '#/components/responses/Error' }
  /carbon/transactions:
    get:
      operationId: listCarbonTransactions
      parameters:
        - { $ref: '#/components/parameters/Limit' }
        - { $ref: '#/components/parameters/Offset' }
        - { name: dept, in: query, schema: { type: string, format: uuid } }
        - { name: from, in: query, schema: { type: string, format: date } }
        - { name: to, in: query, schema: { type: string, format: date } }
        - { name: source, in: query, schema: { $ref: '#/components/schemas/CarbonSource' } }
        - { name: status, in: query, schema: { $ref: '#/components/schemas/CarbonStatus' } }
      responses: { '200': { description: Carbon transaction page, content: { application/json: { schema: { $ref: '#/components/schemas/CarbonTransactionPage' } } } } }
    post:
      operationId: createCarbonTransaction
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/CarbonTransactionInput' } } } }
      responses:
        '201': { description: Draft created, content: { application/json: { schema: { $ref: '#/components/schemas/CarbonTransaction' } } } }
        '400': { $ref: '#/components/responses/Error' }
  /carbon/transactions/{id}/verify:
    parameters: [{ $ref: '#/components/parameters/ID' }]
    post:
      operationId: verifyCarbonTransaction
      responses:
        '200': { description: Verified with authoritative CO2, content: { application/json: { schema: { $ref: '#/components/schemas/CarbonTransaction' } } } }
        '403': { $ref: '#/components/responses/Error' }
        '409': { $ref: '#/components/responses/Error' }
  /carbon/summary:
    get:
      operationId: carbonSummary
      parameters:
        - { name: dept, in: query, schema: { type: string, format: uuid } }
        - { name: from, in: query, schema: { type: string, format: date } }
        - { name: to, in: query, schema: { type: string, format: date } }
      responses: { '200': { description: Verified emissions only, content: { application/json: { schema: { $ref: '#/components/schemas/CarbonSummary' } } } } }
  /goals:
    get:
      operationId: listEnvironmentalGoals
      parameters: [{ $ref: '#/components/parameters/Limit' }, { $ref: '#/components/parameters/Offset' }, { name: dept, in: query, schema: { type: string, format: uuid } }]
      responses: { '200': { description: Environmental goal page, content: { application/json: { schema: { $ref: '#/components/schemas/EnvironmentalGoalPage' } } } } }
    post:
      operationId: createEnvironmentalGoal
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/EnvironmentalGoalInput' } } } }
      responses: { '201': { description: Goal created, content: { application/json: { schema: { $ref: '#/components/schemas/EnvironmentalGoal' } } } } }
  /goals/{id}:
    parameters: [{ $ref: '#/components/parameters/ID' }]
    put:
      operationId: updateEnvironmentalGoal
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/EnvironmentalGoalInput' } } } }
      responses: { '200': { description: Goal updated, content: { application/json: { schema: { $ref: '#/components/schemas/EnvironmentalGoal' } } } } }
components:
  securitySchemes: { bearerAuth: { type: http, scheme: bearer, bearerFormat: JWT } }
  parameters:
    ID: { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    Limit: { name: limit, in: query, schema: { type: integer, minimum: 1, maximum: 100, default: 20 } }
    Offset: { name: offset, in: query, schema: { type: integer, minimum: 0, default: 0 } }
  responses:
    Error: { description: Request failed, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
  requestBodies:
    EntityBody: { required: true, content: { application/json: { schema: { type: object, additionalProperties: true } } } }
    DepartmentInput: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/DepartmentInput' } } } }
  schemas:
    Error: { type: object, required: [code, message], properties: { code: { type: string }, message: { type: string }, fields: { type: object, additionalProperties: { type: string } } } }
    LoginRequest: { type: object, required: [email, password], properties: { email: { type: string, format: email }, password: { type: string, format: password } } }
    AuthResponse: { type: object, required: [accessToken, refreshToken], properties: { accessToken: { type: string }, refreshToken: { type: string }, user: { $ref: '#/components/schemas/User' } } }
    Role: { type: string, enum: [employee, dept_head, auditor, admin] }
    Status: { type: string, enum: [active, inactive] }
    User: { type: object, required: [id, name, email, role], properties: { id: { type: string, format: uuid }, name: { type: string }, email: { type: string, format: email }, role: { $ref: '#/components/schemas/Role' }, departmentId: { type: [string, 'null'], format: uuid } } }
    DepartmentInput: { type: object, required: [name, code, employeeCount, status], properties: { name: { type: string, maxLength: 120 }, code: { type: string, pattern: '^[A-Za-z0-9]{2,12}$' }, headId: { type: [string, 'null'], format: uuid }, parentId: { type: [string, 'null'], format: uuid }, employeeCount: { type: integer, minimum: 0 }, status: { $ref: '#/components/schemas/Status' } } }
    Department: { allOf: [{ $ref: '#/components/schemas/DepartmentInput' }, { type: object, required: [id, createdAt, updatedAt], properties: { id: { type: string, format: uuid }, createdAt: { type: string, format: date-time }, updatedAt: { type: string, format: date-time } } }] }
    DepartmentPage: { type: object, required: [items, total], properties: { items: { type: array, items: { $ref: '#/components/schemas/Department' } }, total: { type: integer } } }
    CategoryType: { type: string, enum: [csr_activity, challenge] }
    ESGConfig: { type: object, required: [autoEmissionCalc, requireCsrEvidence, autoAwardBadges, notifyComplianceEmail, weightEnv, weightSocial, weightGov], properties: { autoEmissionCalc: { type: boolean }, requireCsrEvidence: { type: boolean }, autoAwardBadges: { type: boolean }, notifyComplianceEmail: { type: boolean }, weightEnv: { type: integer, minimum: 0, maximum: 100 }, weightSocial: { type: integer, minimum: 0, maximum: 100 }, weightGov: { type: integer, minimum: 0, maximum: 100 } } }
    NotificationEvent: { type: string, enum: [compliance_raised, approval_decision, policy_reminder, badge_unlock, compliance_overdue] }
    NotificationPreference: { type: object, required: [eventType, inAppEnabled, emailEnabled], properties: { eventType: { $ref: '#/components/schemas/NotificationEvent' }, inAppEnabled: { type: boolean }, emailEnabled: { type: boolean } } }
    Decimal: { type: string, pattern: '^-?[0-9]+(\.[0-9]+)?$' }
    CarbonSource: { type: string, enum: [purchase, manufacturing, expense, fleet] }
    CarbonStatus: { type: string, enum: [draft, verified] }
    CarbonSuggestion:
      type: object
      required: [source, quantity, unit, confidence, evidenceUrl]
      properties:
        source: { type: string }
        categoryId: { type: [string, 'null'], format: uuid }
        quantity: { type: number, minimum: 0 }
        unit: { type: string }
        confidence: { type: number, minimum: 0, maximum: 1 }
        evidenceUrl: { type: string }
    CarbonTransactionInput:
      type: object
      required: [departmentId, source, quantity, emissionFactorId, unit, txnDate]
      properties:
        departmentId: { type: string, format: uuid }
        source: { $ref: '#/components/schemas/CarbonSource' }
        quantity: { $ref: '#/components/schemas/Decimal' }
        emissionFactorId: { type: string, format: uuid }
        unit: { type: string }
        txnDate: { type: string, format: date }
        evidenceUrl: { type: string }
    CarbonTransaction:
      allOf:
        - { $ref: '#/components/schemas/CarbonTransactionInput' }
        - type: object
          required: [id, factorValue, computedCo2, status, createdAt]
          properties:
            id: { type: string, format: uuid }
            factorValue: { $ref: '#/components/schemas/Decimal' }
            computedCo2: { $ref: '#/components/schemas/Decimal' }
            status: { $ref: '#/components/schemas/CarbonStatus' }
            verifiedBy: { type: string, format: uuid }
            verifiedAt: { type: string, format: date-time }
            createdAt: { type: string, format: date-time }
    CarbonTransactionPage: { type: object, required: [items, total], properties: { items: { type: array, items: { $ref: '#/components/schemas/CarbonTransaction' } }, total: { type: integer } } }
    CarbonSummary:
      type: object
      required: [total, bySource]
      properties:
        total: { $ref: '#/components/schemas/Decimal' }
        bySource: { type: object, additionalProperties: { $ref: '#/components/schemas/Decimal' } }
    GoalStatus: { type: string, enum: [on_track, at_risk, completed] }
    EnvironmentalGoalInput:
      type: object
      required: [name, departmentId, targetCo2, deadline]
      properties:
        name: { type: string, minLength: 1 }
        departmentId: { type: string, format: uuid }
        targetCo2: { $ref: '#/components/schemas/Decimal' }
        currentCo2: { $ref: '#/components/schemas/Decimal' }
        deadline: { type: string, format: date }
    EnvironmentalGoal:
      allOf:
        - { $ref: '#/components/schemas/EnvironmentalGoalInput' }
        - type: object
          required: [id, currentCo2, status, createdAt, updatedAt]
          properties:
            id: { type: string, format: uuid }
            currentCo2: { $ref: '#/components/schemas/Decimal' }
            status: { $ref: '#/components/schemas/GoalStatus' }
            createdAt: { type: string, format: date-time }
            updatedAt: { type: string, format: date-time }
    EnvironmentalGoalPage: { type: object, required: [items, total], properties: { items: { type: array, items: { $ref: '#/components/schemas/EnvironmentalGoal' } }, total: { type: integer } } }
