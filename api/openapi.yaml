openapi: 3.1.0
info:
  title: EcoSphere API
  version: 0.1.0
servers:
  - url: http://localhost:8080
paths:
  /health:
    get:
      operationId: health
      responses:
        '200':
          description: Service is healthy
components:
  schemas:
    Error:
      type: object
      required: [code, message]
      properties:
        code: { type: string }
        message: { type: string }
        fields: { type: object, additionalProperties: { type: string } }
